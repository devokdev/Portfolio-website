<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Kartavya Dev</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/98.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <style>
        /* Base Body & Layout */
        :root {
            --win-bg: #c0c0c0;
            --win-shadow: inset 1px 1px 0px 1px #ffffff, inset 0 0 0 1px #868a8e, 1px 1px 0 1px #000000;
        }

        body {
            font-family: 'VT323', monospace;
            cursor: auto;
            /* Fallback to standard cursor for better compatibility */
            overflow: hidden;
            /* Desktop doesn't scroll, windows do */
            background-color: #008080;
            /* Classic Windows Teal */
            height: 100vh;
            width: 100vw;
            margin: 0;
            user-select: none;
        }

        #error-display {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff0000;
            color: white;
            padding: 20px;
            border: 4px double white;
            z-index: 10001;
            font-family: 'Courier New', monospace;
            max-width: 80%;
            white-space: pre-wrap;
        }

        /* --- CRT EFFECT LAYER --- */
        #crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none !important;
            z-index: 9999;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            opacity: 0.8;
        }

        #crt-vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none !important;
            z-index: 9998;
            background: radial-gradient(circle, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);
        }

        /* Flicker Animation */
        @keyframes flicker {
            0% {
                opacity: 0.97;
            }

            5% {
                opacity: 0.95;
            }

            10% {
                opacity: 0.9;
            }

            15% {
                opacity: 0.95;
            }

            20% {
                opacity: 0.9;
            }

            25% {
                opacity: 0.98;
            }

            30% {
                opacity: 0.95;
            }

            35% {
                opacity: 0.9;
            }

            40% {
                opacity: 0.95;
            }

            45% {
                opacity: 0.9;
            }

            50% {
                opacity: 0.98;
            }

            55% {
                opacity: 0.95;
            }

            60% {
                opacity: 0.9;
            }

            65% {
                opacity: 0.95;
            }

            70% {
                opacity: 0.9;
            }

            75% {
                opacity: 0.98;
            }

            80% {
                opacity: 0.95;
            }

            85% {
                opacity: 0.9;
            }

            90% {
                opacity: 0.95;
            }

            95% {
                opacity: 0.9;
            }

            100% {
                opacity: 0.98;
            }
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        /* --- THEMES --- */
        .dark-theme {
            background-color: #1a1a1a;
            color: #b0c4de;
        }

        .light-theme {
            background-color: #008080;
            color: #000;
        }

        /* Window Styling */
        .window {
            position: absolute;
            min-width: 300px;
            box-shadow: var(--win-shadow);
            background: #c0c0c0;
            display: flex;
            flex-direction: column;
        }

        .dark-theme .window {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            backdrop-filter: blur(8px);
            color: #b0c4de;
        }

        .title-bar {
            cursor: grab;
            user-select: none;
            padding: 3px 5px 3px 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar:active {
            cursor: grabbing;
        }

        .dark-theme .title-bar {
            background: linear-gradient(90deg, #000050, #0a528d);
        }

        /* Desktop Icons */
        .desktop-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 10px;
            color: white;
            text-shadow: 1px 1px 2px black;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            border: 1px dotted white;
        }

        .desktop-icon img,
        .desktop-icon i {
            width: 32px;
            height: 32px;
            margin-bottom: 4px;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #c0c0c0;
            border-top: 2px solid white;
            display: flex;
            align-items: center;
            padding: 2px 5px;
            z-index: 1000;
            box-shadow: inset 1px 1px 0px 1px #ffffff;
        }

        .dark-theme .taskbar {
            background: #111;
            border-top: 2px solid #00ffcc;
            box-shadow: 0 -2px 10px rgba(0, 255, 204, 0.3);
        }

        .start-button {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: bold;
            padding: 2px 10px !important;
            height: 32px;
        }

        .taskbar-divider {
            width: 2px;
            height: 24px;
            background: #808080;
            border-right: 1px solid white;
            margin: 0 8px;
        }

        .tray {
            margin-left: auto;
            border: 2px solid;
            border-color: #808080 white white #808080;
            padding: 2px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        /* BIOS Style */
        #bios-screen {
            position: fixed;
            inset: 0;
            background: black;
            color: #ccc;
            padding: 40px;
            font-family: 'Courier New', Courier, monospace;
            z-index: 10000;
            overflow: hidden;
            font-size: 18px;
        }

        .bios-line {
            margin-bottom: 4px;
            white-space: pre-wrap;
        }

        .bios-cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #ccc;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 16px;
            height: 16px;
        }

        ::-webkit-scrollbar-track {
            background: #dfdfdf;
            box-shadow: inset 1px 1px #808080;
        }

        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            box-shadow: inset 1px 1px #fff, inset -1px -1px #808080, 1px 1px #000;
        }

        ::-webkit-scrollbar-button {
            background: #c0c0c0;
            box-shadow: inset 1px 1px #fff, inset -1px -1px #808080, 1px 1px #000;
            width: 16px;
            height: 16px;
        }

        /* Animations */
        .window-enter {
            opacity: 0;
            transform: scale(0.9) translateY(20px);
        }

        .window-enter-active {
            opacity: 1;
            transform: scale(1) translateY(0);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* CMD Box Override */
        .cmd-box {
            background: #000 !important;
            color: #4ade80 !important;
            font-family: 'VT323', monospace;
            padding: 10px;
            overflow-y: auto;
        }

        .cmd-input-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .cmd-input {
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex: 1;
        }

        /* Glitch Text */
        .glitch-text {
            position: relative;
            animation: glitch 2s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% {
                text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            }

            14% {
                text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            }

            15% {
                text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75);
            }

            49% {
                text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75);
            }

            50% {
                text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75);
            }

            99% {
                text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75);
            }

            100% {
                text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75);
            }
        }
    </style>
</head>

<body>
    <div id="crt-overlay"></div>
    <div id="crt-vignette" class="crt-flicker"></div>
    <div id="error-display"></div>

    <div id="root"></div>

    <script type="text/babel">
        // Global Error Handler for Babel Script
        window.onerror = function (msg, url, line, col, error) {
            const display = document.getElementById('error-display');
            if (display) {
                display.style.display = 'block';
                display.textContent = `SYSTEM ERROR: ${msg}\nLine: ${line}\nCol: ${col}\nStack: ${error ? error.stack : 'N/A'}`;
            }
            return false;
        };

        const { useState, useEffect, useRef, Fragment, useMemo } = React;
        // The global for Framer Motion UMD is window.Motion
        const { motion, AnimatePresence } = window.Motion || { motion: () => null, AnimatePresence: Fragment };

        // --- BIOS CONFIG ---
        const BIOS_LOGS = [
            "AMIBIOS(C)2025 American Megatrends, Inc.",
            "BIOS Date: 05/01/26 18:03:57 Ver: 08.00.15",
            "CPU: Intel(R) Core(TM) i9-14900K @ 6.00GHz",
            "Speed: 6000MHz",
            "",
            "Memory Test: 65536KB OK",
            "PMU Initialization Complete",
            "Detecting Primary Master ... [OK]",
            "Detecting Primary Slave  ... [OK]",
            "Detecting Secondary Master.. [OK]",
            "Detecting Secondary Slave .. [OK]",
            "",
            "USB Device(s): 1 Keyboard, 1 Mouse, 1 Hub",
            "Auto-Detecting USB Mass Storage Devices ...",
            "01 USB drive found and configured.",
            "",
            "Checking NVRAM.. OK",
            "Initializing Plug and Play Cards.. DONE",
            "Searching for Boot Record from IDE-0.. OK",
            "",
            "Starting KARTAVYA_OS v1.0.4...",
            "Loading System Files...",
            "Initializing GUI Manager...",
            "Welcome to the Future."
        ];

        // --- APPS & WINDOWS ---
        const INITIAL_WINDOWS = [
            { id: 'welcome', title: 'Welcome.txt', type: 'notepad', content: 'Welcome to my Portfolio! Feel free to explore my projects, read about me, or play some games. Use the Start menu or desktop icons to get started.', x: 100, y: 100, width: 400, height: 300, isOpen: true, isMinimized: false, zIndex: 10 },
            { id: 'cmd', title: 'C:\\WINDOWS\\system32\\cmd.exe', type: 'cmd', x: 150, y: 150, width: 600, height: 400, isOpen: false, isMinimized: false, zIndex: 11 },
        ];

        const PROJECTS = [
            { id: 1, title: "KishanBhai", description: "AI platform for farmers to detect crop diseases and analyze markets.", github: "https://github.com/devokdev" },
            { id: 2, title: "StegoMark", description: "Invisible watermarking using RDWT and Transformers.", github: "https://github.com/devokdev" },
            { id: 3, title: "CivicResolve AI", description: "AI platform for tracking civil issues like waste and waterlogging.", github: "https://github.com/devokdev" },
            { id: 4, title: "RAG Chatbot", description: "Document-based QA using local LLMs and vector embeddings.", github: "https://github.com/devokdev" },
            { id: 5, title: "SafeCircle", description: "Women safety app with real-time tracking and alerts.", github: "https://github.com/devokdev" }
        ];

        // --- COMPONENTS ---

        function BiosBoot({ onComplete }) {
            const [lines, setLines] = useState([]);
            const [index, setIndex] = useState(0);

            useEffect(() => {
                if (index < BIOS_LOGS.length) {
                    const timer = setTimeout(() => {
                        setLines(prev => [...prev, BIOS_LOGS[index]]);
                        setIndex(index + 1);
                    }, index === BIOS_LOGS.length - 1 ? 1000 : Math.random() * 200);
                    return () => clearTimeout(timer);
                } else {
                    setTimeout(onComplete, 1000);
                }
            }, [index]);

            return (
                <div id="bios-screen">
                    {lines.map((line, i) => (
                        <div key={i} className="bios-line">{line}</div>
                    ))}
                    <div className="bios-cursor"></div>
                </div>
            );
        }

        function Window({ win, onClose, onMinimize, onFocus, children, theme }) {
            return (
                <motion.div
                    drag
                    dragMomentum={false}
                    onDragStart={onFocus}
                    initial={{ scale: 0.9, opacity: 0 }}
                    animate={{ scale: 1, opacity: 1 }}
                    exit={{ scale: 0.9, opacity: 0 }}
                    style={{
                        zIndex: win.zIndex,
                        left: win.x,
                        top: win.y,
                        width: win.width,
                        height: win.height,
                        display: win.isMinimized ? 'none' : 'flex'
                    }}
                    className={`window ${theme}-theme`}
                >
                    <div className="title-bar" onPointerDown={onFocus}>
                        <div className="title-bar-text flex items-center gap-2">
                            {win.type === 'cmd' ? <i data-lucide="terminal" className="w-4 h-4 pointer-events-none"></i> : <i data-lucide="file-text" className="w-4 h-4 pointer-events-none"></i>}
                            {win.title}
                        </div>
                        <div className="title-bar-controls">
                            <button aria-label="Minimize" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); onMinimize(win.id); }}></button>
                            <button aria-label="Maximize" className="cursor-pointer"></button>
                            <button aria-label="Close" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); onClose(win.id); }}></button>
                        </div>
                    </div>
                    <div className="window-body flex-1 overflow-hidden flex flex-col">
                        {children}
                    </div>
                </motion.div>
            );
        }

        function CmdApp() {
            const [history, setHistory] = useState(["KARTAVYA_OS [Version 1.0.426]", "(c) 2026 Kartavya Dev. All rights reserved.", ""]);
            const [input, setInput] = useState("");
            const bottomRef = useRef();

            useEffect(() => {
                bottomRef.current?.scrollIntoView({ behavior: "smooth" });
                if (window.lucide) lucide.createIcons();
            }, [history]);

            const handleCommand = (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.trim().toLowerCase();
                    let response = [];

                    if (cmd === 'help') {
                        response = ["Available commands:", "  help     - Show this help", "  ls       - List projects/files", "  clear    - Clear screen", "  whoami   - About Kartavya", "  neofetch - System stats", "  exit     - Close terminal"];
                    } else if (cmd === 'ls') {
                        response = ["Directory of C:\\Users\\Kartavya\\Projects", "05/01/2026  02:45 PM    <DIR>          KishanBhai", "05/01/2026  03:12 PM    <DIR>          StegoMark", "05/01/2026  04:00 PM    <DIR>          CivicResolve_AI", "05/01/2026  04:30 PM    <DIR>          RAG_Chatbot", "05/01/2026  05:00 PM    <DIR>          SafeCircle"];
                    } else if (cmd === 'clear') {
                        setHistory([]);
                        setInput("");
                        return;
                    } else if (cmd === 'whoami') {
                        response = ["Kartavya Dev", "3rd Year B.Tech Student | AI Enthusiast", "Passionate about building scalable AI systems and retro UI."];
                    } else if (cmd === 'neofetch') {
                        response = [
                            "      .---.      OS: KARTAVYA_OS v1.0.4",
                            "     /     \\     Host: Portfolio-Laptop-2026",
                            "    | () () |    Kernel: 6.5.0-pixel-rain",
                            "     \\  ^  /     Uptime: 42 mins",
                            "      |||||      Packages: 1024 (dpkg)",
                            "      |||||      Shell: bash 5.2.15",
                            "                 Resolution: 1920x1080",
                            "                 UI: Windows 98 / Cyberpunk",
                            "                 CPU: Intel i9-14900K (24) @ 6.0GHz",
                            "                 GPU: NVIDIA RTX 5090 Ti",
                            "                 Memory: 32GB / 64GB"
                        ];
                    } else if (cmd === '') {
                        response = [""];
                    } else {
                        response = [`'${cmd}' is not recognized as an internal or external command,`, "operable program or batch file."];
                    }

                    setHistory(prev => [...prev, `C:\\Users\\Kartavya> ${input}`, ...response, ""]);
                    setInput("");
                }
            };

            return (
                <div className="cmd-box flex-1 flex flex-col font-mono text-sm md:text-base">
                    <div className="flex-1 overflow-y-auto pr-2">
                        {history.map((line, i) => <div key={i}>{line}</div>)}
                        <div className="cmd-input-container">
                            <span>C:\Users\Kartavya&gt;</span>
                            <input
                                autoFocus
                                className="cmd-input"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={handleCommand}
                            />
                        </div>
                        <div ref={bottomRef} />
                    </div>
                </div>
            );
        }

        function ExplorerApp() {
            return (
                <div className="p-4 bg-white text-black flex-1 overflow-y-auto">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {PROJECTS.map(p => (
                            <div key={p.id} className="sunken-panel p-3 bg-gray-100 border border-gray-400">
                                <h3 className="font-bold text-lg">{p.title}</h3>
                                <p className="text-sm mb-2">{p.description}</p>
                                <a href={p.github} target="_blank" className="text-blue-700 underline text-sm">View on GitHub</a>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function NotepadApp({ content }) {
            return (
                <textarea
                    readOnly
                    className="flex-1 p-2 outline-none resize-none font-mono text-base bg-white text-black"
                    value={content}
                />
            );
        }

        function Taskbar({ windows, onStartOpen, onWindowClick, theme, toggleTheme }) {
            const [time, setTime] = useState(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));

            useEffect(() => {
                const timer = setInterval(() => {
                    setTime(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="taskbar">
                    <button className="start-button cursor-pointer" onClick={onStartOpen}>
                        <i data-lucide="monitor" className="w-4 h-4 pointer-events-none"></i>
                        <span>Start</span>
                    </button>
                    <div className="taskbar-divider"></div>
                    <div className="flex gap-1 overflow-x-auto">
                        {windows.map(win => win.isOpen && (
                            <button
                                key={win.id}
                                className={`px-2 h-8 min-w-[100px] text-left truncate cursor-pointer ${!win.isMinimized ? 'active' : ''}`}
                                onClick={() => onWindowClick(win.id)}
                            >
                                {win.title}
                            </button>
                        ))}
                    </div>
                    <div className="tray">
                        <button onClick={toggleTheme} className="p-0 border-none bg-transparent hover:scale-110">
                            {theme === 'dark' ? <i data-lucide="sun" className="w-4 h-4 text-yellow-400"></i> : <i data-lucide="moon" className="w-4 h-4 text-blue-800"></i>}
                        </button>
                        <span>{time}</span>
                    </div>
                </div>
            );
        }

        function AsciiGame() {
            const [pos, setPos] = useState(2);
            const [enemies, setEnemies] = useState([{ r: 0, c: 1 }]);
            const [score, setScore] = useState(0);
            const [gameOver, setGameOver] = useState(false);
            const gameRef = useRef();

            useEffect(() => {
                if (gameOver) return;
                const interval = setInterval(() => {
                    setEnemies(prev => {
                        const next = prev.map(e => ({ ...e, r: e.r + 1 })).filter(e => e.r < 15);
                        if (Math.random() > 0.8) next.push({ r: 0, c: Math.floor(Math.random() * 5) });
                        return next;
                    });
                    setScore(s => s + 1);
                }, 100);
                return () => clearInterval(interval);
            }, [gameOver]);

            useEffect(() => {
                enemies.forEach(e => {
                    if (e.r === 13 && e.c === pos) setGameOver(true);
                });
            }, [enemies, pos]);

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'ArrowLeft') setPos(p => Math.max(0, p - 1));
                    if (e.key === 'ArrowRight') setPos(p => Math.min(4, p + 1));
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, []);

            if (gameOver) return (
                <div className="flex-1 bg-black text-red-500 flex flex-col items-center justify-center font-mono">
                    <h2 className="text-2xl mb-4">GAME OVER</h2>
                    <p className="mb-4">Score: {score}</p>
                    <button className="px-4 py-2 border border-red-500" onClick={() => { setGameOver(false); setEnemies([]); setScore(0); }}>RESTART</button>
                </div>
            );

            return (
                <div className="flex-1 bg-black text-green-500 flex flex-col items-center justify-center font-mono p-4 overflow-hidden select-none">
                    <div className="mb-2 text-xs">SCORE: {score} | USE ARROWS</div>
                    <div className="border-x border-green-900 px-4 leading-none">
                        {Array.from({ length: 15 }).map((_, r) => (
                            <div key={r} className="flex">
                                {Array.from({ length: 5 }).map((_, c) => (
                                    <span key={c} className="w-6 h-4 text-center">
                                        {r === 13 && c === pos ? '▲' : enemies.find(e => e.r === r && e.c === c) ? '█' : ' '}
                                    </span>
                                ))}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ContactForm() {
            const [status, setStatus] = useState('Send');
            const handleSubmit = (e) => {
                e.preventDefault();
                setStatus('Sending...');
                setTimeout(() => { setStatus('Sent!'); setTimeout(() => setStatus('Send'), 3000); }, 1500);
            };
            return (
                <form className="p-4 bg-gray-200 text-black flex-1 flex flex-col gap-3 overflow-y-auto" onSubmit={handleSubmit}>
                    <div className="field-row-stacked">
                        <label>To:</label>
                        <input type="text" value="kartavyadev3@gmail.com" readOnly />
                    </div>
                    <div className="field-row-stacked">
                        <label>Subject:</label>
                        <input type="text" placeholder="Inquiry from Portfolio" />
                    </div>
                    <div className="field-row-stacked flex-1 flex flex-col">
                        <label>Message:</label>
                        <textarea className="flex-1" placeholder="Type your message here..."></textarea>
                    </div>
                    <div className="flex justify-end">
                        <button type="submit" className="px-6 py-1">{status}</button>
                    </div>
                </form>
            );
        }

        function Desktop({ onIconClick }) {
            const icons = [
                { id: 'about', label: 'About_Me.txt', icon: 'file-text', color: 'text-blue-500' },
                { id: 'projects', label: 'Projects.exe', icon: 'folder', color: 'text-yellow-500' },
                { id: 'cmd', label: 'Terminal.exe', icon: 'terminal', color: 'text-green-500' },
                { id: 'contact', label: 'Mail.lnk', icon: 'mail', color: 'text-red-500' },
                { id: 'game', label: 'Racer.exe', icon: 'gamepad-2', color: 'text-purple-500' }
            ];

            return (
                <div className="p-4 grid grid-flow-col grid-rows-[repeat(auto-fill,100px)] gap-4 h-[calc(100vh-40px)] w-full">
                    {icons.map(icon => (
                        <div key={icon.id} className="desktop-icon cursor-pointer" onClick={() => onIconClick(icon.id)}>
                            <i data-lucide={icon.icon} className={`${icon.color} w-10 h-10 pointer-events-none`}></i>
                            <span className="text-sm pointer-events-none">{icon.label}</span>
                        </div>
                    ))}
                </div>
            );
        }

        function App() {
            const [booting, setBooting] = useState(true);
            const [theme, setTheme] = useState('dark');
            const [windows, setWindows] = useState(INITIAL_WINDOWS);
            const [maxZ, setMaxZ] = useState(20);

            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [booting, windows]);

            const openWindow = (id) => {
                const existing = windows.find(w => w.id === id);
                if (existing) {
                    setWindows(prev => prev.map(win =>
                        win.id === id ? { ...win, isOpen: true, isMinimized: false, zIndex: maxZ + 1 } : win
                    ));
                } else {
                    let newWin = { id, title: id, isOpen: true, isMinimized: false, zIndex: maxZ + 1, x: 50 + (windows.length * 30), y: 50 + (windows.length * 20), width: 500, height: 400 };
                    if (id === 'projects') { newWin.title = 'Projects.exe'; newWin.type = 'explorer'; }
                    if (id === 'about') { newWin.title = 'About_Me.txt'; newWin.type = 'notepad'; newWin.content = "I am Kartavya Dev, a 3rd-year B.Tech student at SCET, Surat. I specialize in AI and Software Development. I love building tools that solve real-world problems using cutting-edge technology."; }
                    if (id === 'contact') { newWin.title = 'Mail - New Message'; newWin.type = 'contact'; newWin.width = 400; newWin.height = 450; }
                    if (id === 'game') { newWin.title = 'Racer.exe'; newWin.type = 'game'; newWin.width = 300; newWin.height = 450; }
                    if (id === 'cmd') { newWin.title = 'C:\\WINDOWS\\system32\\cmd.exe'; newWin.type = 'cmd'; }
                    setWindows(prev => [...prev, newWin]);
                }
                setMaxZ(maxZ + 1);
            };

            const closeWindow = (id) => {
                setWindows(prev => prev.map(win => win.id === id ? { ...win, isOpen: false } : win));
            };

            const minimizeWindow = (id) => {
                setWindows(prev => prev.map(win => win.id === id ? { ...win, isMinimized: true } : win));
            };

            const focusWindow = (id) => {
                setWindows(prev => prev.map(win => win.id === id ? { ...win, isMinimized: false, zIndex: maxZ + 1 } : win));
                setMaxZ(maxZ + 1);
            };

            if (booting) return <BiosBoot onComplete={() => setBooting(false)} />;

            return (
                <div className={`${theme}-theme h-screen w-screen relative overflow-hidden`}>
                    <Desktop onIconClick={openWindow} />

                    <AnimatePresence>
                        {windows.map(win => win.isOpen && (
                            <Window
                                key={win.id}
                                win={win}
                                theme={theme}
                                onClose={closeWindow}
                                onMinimize={minimizeWindow}
                                onFocus={() => focusWindow(win.id)}
                            >
                                {win.type === 'cmd' && <CmdApp />}
                                {win.type === 'notepad' && <NotepadApp content={win.content} />}
                                {win.type === 'explorer' && <ExplorerApp />}
                                {win.type === 'contact' && <ContactForm />}
                                {win.type === 'game' && <AsciiGame />}
                            </Window>
                        ))}
                    </AnimatePresence>

                    <Taskbar
                        windows={windows}
                        theme={theme}
                        toggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
                        onWindowClick={(id) => {
                            const win = windows.find(w => w.id === id);
                            if (win.isMinimized) focusWindow(id);
                            else minimizeWindow(id);
                        }}
                        onStartOpen={() => openWindow('cmd')}
                    />

                    {/* Pixel Rain Layer for Dark Theme */}
                    {theme === 'dark' && <PixelRain theme={theme} />}
                </div>
            );
        }

        function PixelRain({ theme }) {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let w = canvas.width = window.innerWidth;
                let h = canvas.height = window.innerHeight;

                const columns = Math.floor(w / 20);
                const drops = new Array(columns).fill(1);

                const draw = () => {
                    ctx.fillStyle = 'rgba(26, 26, 26, 0.05)';
                    ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#0f0';
                    ctx.font = '15px monospace';

                    for (let i = 0; i < drops.length; i++) {
                        const text = String.fromCharCode(Math.random() * 128);
                        ctx.fillText(text, i * 20, drops[i] * 20);
                        if (drops[i] * 20 > h && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                };

                const interval = setInterval(draw, 33);
                return () => clearInterval(interval);
            }, []);

            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none opacity-20 z-0" />;
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (e) {
            const display = document.getElementById('error-display');
            if (display) {
                display.style.display = 'block';
                display.textContent = `RENDER ERROR: ${e.message}\nStack: ${e.stack}`;
            }
        }
    </script>
</body>

</html>
