        // --- ASCII Racer Game Component (User's settings + harder) ---
        function AsciiGame() {
            const [renderString, setRenderString] = useState("Loading Game..."); const gameLoopRef = useRef(null); const playerRef = useRef({ x: 15, char: '^' }); const obstaclesRef = useRef([]); const frameRef = useRef(0); const scoreRef = useRef(0); const gameSpeedRef = useRef(5); const isGameOverRef = useRef(false); const GAME_WIDTH = 30; const GAME_HEIGHT = 12;

            const centerText = (text, width) => { const padding = Math.max(0, Math.floor((width - text.length) / 2)); return ' '.repeat(padding) + text; };
            const buildRenderString = () => { let grid = Array(GAME_HEIGHT).fill().map(() => Array(GAME_WIDTH).fill(' ')); const player = playerRef.current; if (player.x >= 0 && player.x < GAME_WIDTH) grid[GAME_HEIGHT - 1][player.x] = player.char; obstaclesRef.current.forEach(obs => { if (obs.y >= 0 && obs.y < GAME_HEIGHT && obs.x >= 0 && obs.x < GAME_WIDTH) grid[obs.y][obs.x] = obs.char; }); const scoreLine = `Score: ${scoreRef.current} | Use ArrowLeft/Right`; let output = centerText(scoreLine, GAME_WIDTH + 2) + '\n'; output += `+${'-'.repeat(GAME_WIDTH)}+\n`; output += grid.map(row => `|${row.join('')}|`).join('\n'); output += `\n+${'-'.repeat(GAME_WIDTH)}+\n`; if (isGameOverRef.current) { const gameOverLine1 = "GAME OVER!"; const gameOverLine2 = "Press 'R' to Restart"; output += `\n${centerText(gameOverLine1, GAME_WIDTH + 2)}\n${centerText(gameOverLine2, GAME_WIDTH + 2)}`; } return output; };
            const updateGame = () => { 
                if (isGameOverRef.current) { cancelAnimationFrame(gameLoopRef.current); return; } 
                frameRef.current++; 
                let shouldUpdateLogic = frameRef.current % gameSpeedRef.current === 0; 
                if (shouldUpdateLogic) { 
                    scoreRef.current++; 
                    let newObstacles = []; 
                    obstaclesRef.current.forEach(obs => { 
                        obs.y++; 
                        if (obs.x === playerRef.current.x && obs.y === GAME_HEIGHT - 1) { 
                            isGameOverRef.current = true; playerRef.current.char = 'X'; 
                        } 
                        if (obs.y < GAME_HEIGHT) newObstacles.push(obs); 
                    }); 
                    obstaclesRef.current = newObstacles; 
                    if (frameRef.current % (gameSpeedRef.current * 2) === 0) { 
                        obstaclesRef.current.push({ x: Math.floor(Math.random() * GAME_WIDTH), y: 0, char: 'O' }); 
                    }
                    // Added second spawner back for difficulty
                    if (frameRef.current % (gameSpeedRef.current * 3) === 0) { 
                        obstaclesRef.current.push({ x: Math.floor(Math.random() * GAME_WIDTH), y: 0, char: '*' });
                    }
                } 
                setRenderString(buildRenderString()); 
                gameLoopRef.current = requestAnimationFrame(updateGame); 
            };

            useEffect(() => { window.addEventListener('keydown', handleKeyDown); resetGame(); return () => { cancelAnimationFrame(gameLoopRef.current); window.removeEventListener('keydown', handleKeyDown); }; }, []);

        // --- Main App Component (Pixel Rain Logic) ---
        function App() {
            const [theme, setTheme] = useState('dark');
            
            // --- Refs for canvas effect ---
            const canvasRef = useRef(null);
            const mousePosRef = useRef(null);
            const animationFrameRef = useRef(null);
            const particlesRef = useRef([]);

            // --- Canvas Animation Effect ---
            useEffect(() => {
                // We use document.getElementById here because the canvas is outside the React root
                const canvas = document.getElementById('pixel-rain-canvas');
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                let w = canvas.width = window.innerWidth;
                let h = canvas.height = window.innerHeight;

                const handleResize = () => {
                    w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight;
                };

                const handleMouseMove = (e) => {
                    mousePosRef.current = { x: e.clientX, y: e.clientY };
                };
                
                const handleMouseLeave = () => {
                    mousePosRef.current = null;
                };

                window.addEventListener('resize', handleResize);
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseleave', handleMouseLeave);

                const darkColors = ['#4ade80', '#00ffcc', '#b0c4de'];
                const lightColors = ['#000000', '#000080', '#555555'];
                const maxParticles = 1500; // Max particles

                const createParticle = (xPos, colorList) => {
                    return {
                        x: xPos || Math.random() * w,
                        y: 0,
                        size: Math.random() * 2 + 1, // 1 to 3
                        speed: Math.random() * 1.5 + 0.5, // 0.5 to 2.0
                        color: colorList[Math.floor(Math.random() * colorList.length)]
                    };
                };

                const draw = () => {
                    // Check body class directly to get the current theme
                    const isDarkTheme = document.body.classList.contains('dark-theme');
                    const particleColors = isDarkTheme ? darkColors : lightColors;
                    // Use theme-appropriate background color for the fading effect
                    const bgColor = isDarkTheme ? 'rgba(26, 26, 26, 0.1)' : 'rgba(184, 184, 184, 0.1)';

                    ctx.fillStyle = bgColor;
                    ctx.fillRect(0, 0, w, h);

                    // Update & Draw Particles
                    for (let i = particlesRef.current.length - 1; i >= 0; i--) {
                        const p = particlesRef.current[i];
                        p.y += p.speed;
                        
                        if (p.y > h) {
                            particlesRef.current.splice(i, 1);
                        } else {
                            ctx.fillStyle = p.color;
                            ctx.fillRect(p.x, p.y, p.size, p.size);
                        }
                    }

                    // Create new particles (if not at cap)
                    if (particlesRef.current.length < maxParticles) {
                        // Base Rain (20% chance per frame)
                        if (Math.random() > 0.8) {
                            particlesRef.current.push(createParticle(null, particleColors));
                        }
                        
                        // Hover Rain (20% chance per frame)
                        if (mousePosRef.current && Math.random() > 0.8) { 
                            particlesRef.current.push(createParticle(
                                mousePosRef.current.x + (Math.random() - 0.5) * 60, // 60px band
                                particleColors
                            ));
                        }
                    }
                    
                    animationFrameRef.current = requestAnimationFrame(draw);
                };

                draw();

                return () => {
                    cancelAnimationFrame(animationFrameRef.current);
                    window.removeEventListener('resize', handleResize);
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseleave', handleMouseLeave);
                };
            }, []); // Runs only once on component mount

            
            // This effect *updates the body class* and *canvas opacity*
            useEffect(() => {
                document.body.className = `${theme}-theme`;
                
                // Set canvas opacity based on theme
                const canvas = document.getElementById('pixel-rain-canvas');
                if (canvas) {
                    canvas.style.opacity = theme === 'dark' ? '0.3' : '0.5';
                }
            }, [theme]);

            const toggleTheme = () => {
                setTheme(current => (current === 'dark' ? 'light' : 'dark'));
            };

            return (
                <Fragment>
                    <NavBar toggleTheme={toggleTheme} theme={theme} />
                    <div className="container mx-auto max-w-7xl relative z-10">
                        <Hero />
                        <main>
                            <About />
                            <Projects />
                            <Achievements />
                            <Contact />
                        </main>
                        {/* MODIFIED: Responsive font size */}
                        <footer className="text-center p-6"><p className="footer-text text-base md:text-lg">© 2025 Kartavya Dev | Thanks for reaching till the end of page</p></footer>
                    </div>
                </Fragment>
            );
        }
        // --- END MODIFIED Component ---


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
